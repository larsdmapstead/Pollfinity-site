name = "pollfinity"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "."
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "pollfinity-panel"
database_id = "REPLACE_WITH_ID_FROM_wrangler_d1_create"

[vars]
# Set the real value with: wrangler secret put ADMIN_KEY
# (leaving a placeholder here so local dev works)
ADMIN_KEY = "set-me-via-wrangler-secret"
